<!DOCTYPE html>
<html lang="en">
<head>
<!-- Styles remain exactly as provided in your original file -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Order Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* =========================== STYLES (ORIGINAL + LOGIN) =========================== */
:root{
  --bg: #14171C; --surface: #1B1F26; --surface-2: #21262F; --border: #2B313B;
  --text: #EDEFF2; --text-muted:#8A93A3; --text-faint:#5B6472;
  --paper: #F4F1E8; --paper-ink: #2A2620; --paper-ink-muted: #746C5E; --paper-edge:#E4DFCF;
  --pending: #F2B441; --pending-ink:#3A2C05; --preparing: #4C9FE8; --preparing-ink:#0B2540;
  --delivered: #46C08A; --delivered-ink:#08301F; --cancelled: #E8604C; --cancelled-ink:#3A0E07;
  --radius-sm: 6px; --radius-md: 10px; --radius-lg: 16px;
  --font-mono: 'JetBrains Mono', monospace; --font-body: 'IBM Plex Sans', sans-serif;
}
*{ box-sizing: border-box; }
body{ margin:0; background: var(--bg); color: var(--text); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
button{ font-family: inherit; cursor: pointer; }

/* Login Screen Overlay */
#loginScreen {
    position: fixed; inset: 0; background: var(--bg); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
}
.login-card {
    background: var(--surface); border: 1px solid var(--border); padding: 30px;
    border-radius: var(--radius-lg); width: 100%; max-width: 400px; text-align: center;
}
.login-card input {
    width: 100%; padding: 12px; margin: 10px 0; background: var(--surface-2);
    border: 1px solid var(--border); color: white; border-radius: 6px;
}
.login-card button {
    width: 100%; padding: 12px; background: var(--pending); color: var(--pending-ink);
    border: none; border-radius: 6px; font-weight: 700; margin-top: 10px;
}
.login-card .toggle-auth { color: var(--text-muted); font-size: 12px; margin-top: 15px; display: block; background: none; border: none; width: 100%; }

/* Layout Components */
.topbar{ height: 60px; display:flex; align-items:center; padding: 0 20px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top:0; z-index: 30; }
.topbar__brand{ display:flex; align-items:center; gap:10px; }
.brand-mark{ width:32px; height:32px; border-radius:8px; background: linear-gradient(155deg, var(--pending), var(--cancelled)); color:#1a1206; display:flex; align-items:center; justify-content:center; font-family: var(--font-mono); font-weight:800; }
.topbar__title{ font-size: 15px; font-weight:500; color: var(--text-muted); margin:0; padding-left:20px; border-left:1px solid var(--border); flex:1; }
.app-shell{ display:flex; min-height: calc(100vh - 60px); }
.sidebar{ width: 168px; background: var(--surface); border-right: 1px solid var(--border); padding: 16px 10px; display:flex; flex-direction:column; gap:2px; }
.side-link{ display:flex; align-items:center; gap:10px; padding: 9px 10px; border-radius: var(--radius-sm); color: var(--text-muted); font-size:13px; text-decoration: none; }
.side-link.is-active{ background: var(--surface-2); color: var(--pending); }
.main{ flex:1; padding: 22px 24px; min-width:0; }

/* Stats Grid */
.stats__grid{ display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; margin-bottom: 24px; }
.stat-card{ background: var(--surface); border:1px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; border-top: 3px solid transparent; }
.stat-card--pending{ border-top-color: var(--pending); }
.stat-card--revenue{ border-top-color: #C9A9F5; }
.stat-card__value{ font-family: var(--font-mono); font-size: 24px; display: block; margin-top: 5px; }

/* Search & Filters */
.toolbar{ display:flex; gap:14px; margin-bottom: 18px; }
.search{ background: var(--surface); border:1px solid var(--border); border-radius: 999px; padding: 9px 14px; flex: 1; display: flex; align-items: center; }
.search input{ border:none; background:transparent; outline:none; color: var(--text); width:100%; margin-left: 8px; }
.filters{ display:flex; gap:6px; background: var(--surface); border:1px solid var(--border); border-radius:999px; padding:4px; }
.filter-chip{ border:none; background:transparent; color: var(--text-muted); padding: 7px 14px; border-radius:999px; }
.filter-chip.is-active{ background: var(--surface-2); color: var(--text); }

/* Ticket Styles */
.orders__grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 22px; }
.ticket{
    background:#fffdf8;
    color:#222;
    width:320px;
    margin:auto;
    padding:20px;
    border-radius:0;
    position:relative;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
    font-family:"JetBrains Mono", monospace;
    overflow:visible;
}
.ticket::before,
.ticket::after{
    content:"";
    position:absolute;
    left:0;
    width:100%;
    height:8px;
    pointer-events:none;
    background-image:
        radial-gradient(circle, #14171C 3px, transparent 3px);
    background-size:8px 8px;
    background-repeat:repeat-x;
}
.ticket::before{ top:-4px; }
.ticket::after{ bottom:-4px; }
.ticket__head{ display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding-bottom: 10px; margin-bottom: 10px; }
.ticket__id{ font-family: var(--font-mono); font-weight: 800; }
.ticket__section{ margin-bottom: 12px; font-size: 13px; }
.ticket__label{ font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; color: #777; margin: 0; }
.ticket__actions{ display: flex; gap: 8px; margin-top: 15px; }
.status{ margin-top:12px; display:inline-block; padding:6px 12px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:1px; }
.status-pending{ background:#FFE8A3; color:#8A5A00; }
.status-preparing{ background:#D8EEFF; color:#005DB8; }
.status-delivered{ background:#DDF8E5; color:#0A8A44; }
.status-cancelled{ background:#FFD9D9; color:#C62828; }
.btn{ flex:1; border:none; padding:12px; border-radius:6px; font-weight:700; cursor:pointer; transition:.25s; }
.btn:hover{ transform:translateY(-2px); }
.btn-accept{ background:#46C08A; color:white; }
.btn-cancel{ background:#E8604C; color:white; }
.toast-stack{ position: fixed; top: 20px; right: 20px; z-index: 1100; }
</style>
</head>
<body>

<div id="loginScreen">
    <div class="login-card">
        <div class="brand-mark" style="margin: 0 auto 20px;">OD</div>
        <h2 id="authTitle">Admin Login</h2>
        <input type="email" id="authEmail" placeholder="Email Address">
        <input type="password" id="authPassword" placeholder="Password">
        <button id="authBtn">Sign In</button>
        <button class="toggle-auth" id="toggleAuth">Don't have an account? Sign Up</button>
    </div>
</div>

<header class="topbar">
  <div class="topbar__brand">
    <div class="brand-mark">OD</div>
    <span class="brand-name">Order Desk</span>
  </div>
  <h1 class="topbar__title">Admin Dashboard</h1>
  <div class="topbar__profile">
    <button class="profile-chip" style="background:none; border:none; color:white; display:flex; align-items:center; gap:10px;">
      <span id="adminEmail" style="font-size:12px; color:var(--text-muted);"></span>
      <div class="profile-avatar" style="background: var(--preparing); width: 24px; height: 24px; border-radius: 50%; font-size: 10px; display: flex; align-items: center; justify-content: center;">FF</div>
    </button>
  </div>
</header>

<div class="app-shell">
  <nav class="sidebar">
    <a class="side-link is-active" href="#"><span>Dashboard</span></a>
    <a class="side-link" href="#" id="logoutBtn"><span style="color:var(--cancelled)">Logout</span></a>
  </nav>

  <main class="main">
    <section class="stats">
      <div class="stats__grid">
        <div class="stat-card stat-card--pending">
          <span class="stat-card__label">Pending</span>
          <span class="stat-card__value" id="statPending">0</span>
        </div>
        <div class="stat-card" style="border-top-color: var(--preparing)">
            <span class="stat-card__label">Preparing</span>
            <span class="stat-card__value" id="statPreparing">0</span>
        </div>
        <div class="stat-card" style="border-top-color: var(--delivered)">
            <span class="stat-card__label">Completed</span>
            <span class="stat-card__value" id="statDelivered">0</span>
        </div>
        <div class="stat-card stat-card--revenue">
          <span class="stat-card__label">Today's Revenue</span>
          <span class="stat-card__value" id="statRevenue">Rs 0</span>
        </div>
      </div>
    </section>

    <section class="toolbar">
      <div class="search">
        <input id="searchInput" type="text" placeholder="Search customer or ID...">
      </div>
      <div class="filters" id="filters">
        <button class="filter-chip is-active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="pending">Pending</button>
        <button class="filter-chip" data-filter="preparing">Preparing</button>
      </div>
    </section>

    <div class="orders__grid" id="ordersGrid"></div>
  </main>
</div>

<div class="toast-stack" id="toastStack"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =========================== CONFIGURATION =========================== */
const ADMIN_SUPABASE_URL = "https://cctctqhsaywlgcbycecp.supabase.co";
const ADMIN_SUPABASE_KEY = "sb_publishable_57Jt5_fxPpAS3rnBQbYQ2A_RhdLxWwQ";
const adminDB = window.supabase.createClient(ADMIN_SUPABASE_URL, ADMIN_SUPABASE_KEY);

const STATUS = { PENDING: 'pending', PREPARING: 'preparing', DELIVERED: 'delivered', CANCELLED: 'cancelled' };
let STATE = { orders: [], filter: 'all', searchQuery: '', isSignUp: false };

const DOM = {
    loginScreen: document.getElementById('loginScreen'),
    authBtn: document.getElementById('authBtn'),
    toggleAuth: document.getElementById('toggleAuth'),
    emailInput: document.getElementById('authEmail'),
    passInput: document.getElementById('authPassword'),
    adminEmail: document.getElementById('adminEmail'),
    logoutBtn: document.getElementById('logoutBtn'),
    ordersGrid: document.getElementById('ordersGrid'),
    searchInput: document.getElementById('searchInput'),
    statPending: document.getElementById('statPending'),
    statPreparing: document.getElementById('statPreparing'),
    statDelivered: document.getElementById('statDelivered'),
    statRevenue: document.getElementById('statRevenue'),
    filterChips: document.querySelectorAll('.filter-chip')
};

/* =========================== AUTHENTICATION =========================== */
async function checkUser() {
    const { data } = await adminDB.auth.getSession();
    if (data?.session) {
        DOM.loginScreen.style.display = 'none';
        DOM.adminEmail.textContent = data.session.user.email;
        initDashboard();
    }
}

DOM.authBtn.addEventListener('click', async () => {
    const email = DOM.emailInput.value;
    const password = DOM.passInput.value;
    if (!email || !password) return alert("Enter credentials");
    if (STATE.isSignUp) {
        const { error } = await adminDB.auth.signUp({ email, password });
        if (error) alert(error.message); else alert("Check email for verification!");
    } else {
        const { error } = await adminDB.auth.signInWithPassword({ email, password });
        if (error) alert(error.message); else checkUser();
    }
});

DOM.toggleAuth.addEventListener('click', () => {
    STATE.isSignUp = !STATE.isSignUp;
    document.getElementById('authTitle').textContent = STATE.isSignUp ? "Admin Sign Up" : "Admin Login";
    DOM.authBtn.textContent = STATE.isSignUp ? "Create Account" : "Sign In";
    DOM.toggleAuth.textContent = STATE.isSignUp ? "Login instead" : "Don't have an account? Sign Up";
});

DOM.logoutBtn.addEventListener('click', async () => {
    await adminDB.auth.signOut();
    window.location.reload();
});

/* =========================== DATA & REALTIME =========================== */
async function loadOrders() {
    const { data, error } = await adminDB.from("orders").select("*").order("created_at", { ascending: false });
    if (error) return console.error(error);
    STATE.orders = data;
    render();
}

function subscribeToOrders() {
    adminDB.channel('orders-realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, () => {
        loadOrders();
    }).subscribe();
}

async function updateStatus(id, newStatus) {
    const { error } = await adminDB.from("orders").update({ status: newStatus }).eq("id", id);
    if (error) alert(error.message);
}

/* =========================== RENDERING LOGIC =========================== */

function createTicketHTML(order, displayIndex) {
    // 1. Resolve Items (Check if string or array)
    let itemsArray = [];
    try {
        itemsArray = typeof order.items === 'string' ? JSON.parse(order.items) : (order.items || []);
    } catch (e) {
        console.error("Error parsing items for order:", order.id, e);
    }

    // Debugging: Verify data shape in console
    console.log(`Order #${order.id} Data:`, {
        customer: order.customer,
        items: itemsArray,
        total: order.total
    });

    const dateStr = order.created_at ? new Date(order.created_at).toLocaleString() : "Unknown Date";
    
    // 2. Generate Items HTML with Line Totals
    const itemsHTML = itemsArray.map(i => `
        <div style="display:flex; justify-content:space-between; margin-bottom: 4px; font-size: 12px;">
            <span>${i.qty}× ${i.name}</span>
            <span>Rs ${Number(i.price || 0) * Number(i.qty || 0)}</span>
        </div>
    `).join("");

    return `
    <div class="ticket">
        <div class="ticket__head">
            <div>
                <div class="ticket__id">ORDER #${String(displayIndex).padStart(3, "0")}</div>
                <div style="font-size:11px;color:#777;">${dateStr}</div>
            </div>
            <strong style="font-size:12px;">EATT OUT</strong>
        </div>
        <div class="ticket__section">
            <p class="ticket__label">Customer</p>
            <strong>${order.customer || "Guest"}</strong><br>
            ${order.phone || "No Phone"}
            <br>
            <div class="status status-${order.status}">${order.status.toUpperCase()}</div>
        </div>
        <hr style="border:none; border-top:1px dashed #ccc; margin: 10px 0;">
        <div class="ticket__section">
            <p class="ticket__label">Items</p>
            ${itemsHTML || '<div style="color:red">No items found</div>'}
        </div>
        <hr style="border:none; border-top:1px dashed #ccc; margin: 10px 0;">
        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:14px;">
            <span>TOTAL</span>
            <span>Rs ${order.total || 0}</span>
        </div>
        <hr style="border:none; border-top:1px dashed #ccc; margin: 10px 0;">
        <div class="ticket__section">
            <p class="ticket__label">Address</p>
            <span style="font-size:12px;">${order.address || "No Address Provided"}</span>
        </div>
        ${order.notes ? `<div class="ticket__section"><p class="ticket__label">Notes</p><i style="font-size:11px;">${order.notes}</i></div>` : ""}
        <div class="ticket__actions">
            ${order.status === STATUS.PENDING ? `
                <button class="btn btn-accept" onclick="updateStatus('${order.id}','${STATUS.PREPARING}')">ACCEPT</button>
                <button class="btn btn-cancel" onclick="updateStatus('${order.id}','${STATUS.CANCELLED}')">CANCEL</button>
            ` : ''}
            ${order.status === STATUS.PREPARING ? `
                <button class="btn btn-accept" onclick="updateStatus('${order.id}','${STATUS.DELIVERED}')">MARK DELIVERED</button>
            ` : ''}
        </div>
    </div>`;
}

function render() {
    // Update Stats
    const stats = { pending: 0, preparing: 0, delivered: 0, revenue: 0 };
    STATE.orders.forEach(o => {
        if (o.status === STATUS.PENDING) stats.pending++;
        if (o.status === STATUS.PREPARING) stats.preparing++;
        if (o.status === STATUS.DELIVERED) {
            stats.delivered++;
            stats.revenue += Number(o.total || 0);
        }
    });

    DOM.statPending.textContent = stats.pending;
    DOM.statPreparing.textContent = stats.preparing;
    DOM.statDelivered.textContent = stats.delivered;
    DOM.statRevenue.textContent = `Rs ${stats.revenue.toLocaleString()}`;

    // Filter & Render Grid
    const filtered = STATE.orders.filter(o => {
        const matchesFilter = STATE.filter === 'all' || o.status === STATE.filter;
        const matchesSearch = o.customer.toLowerCase().includes(STATE.searchQuery) || o.phone?.includes(STATE.searchQuery);
        return matchesFilter && matchesSearch;
    });

    DOM.ordersGrid.innerHTML = filtered.length ? "" : "<p style='text-align:center; width:100%; color:#777;'>No orders found.</p>";
    filtered.forEach((order, index) => {
        DOM.ordersGrid.innerHTML += createTicketHTML(order, index + 1);
    });
}

/* =========================== INITIALIZATION =========================== */
function initDashboard() {
    loadOrders();
    subscribeToOrders();
}

DOM.filterChips.forEach(button => {
    button.addEventListener("click", () => {
        DOM.filterChips.forEach(btn => btn.classList.remove("is-active"));
        button.classList.add("is-active");
        STATE.filter = button.dataset.filter;
        render();
    });
});

DOM.searchInput.addEventListener("input", (e) => {
    STATE.searchQuery = e.target.value.toLowerCase();
    render();
});

checkUser();
</script>
</body>
</html>
