<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard — Order Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* =========================== STYLES (ORIGINAL + LOGIN) =========================== */
:root{
  --bg: #14171C; --surface: #1B1F26; --surface-2: #21262F; --border: #2B313B;
  --text: #EDEFF2; --text-muted:#8A93A3; --text-faint:#5B6472;
  --paper: #F4F1E8; --paper-ink: #2A2620; --paper-ink-muted: #746C5E; --paper-edge:#E4DFCF;
  --pending: #F2B441; --pending-ink:#3A2C05; --preparing: #4C9FE8; --preparing-ink:#0B2540;
  --delivered: #46C08A; --delivered-ink:#08301F; --cancelled: #E8604C; --cancelled-ink:#3A0E07;
  --radius-sm: 6px; --radius-md: 10px; --radius-lg: 16px;
  --font-mono: 'JetBrains Mono', monospace; --font-body: 'IBM Plex Sans', sans-serif;
}
*{ box-sizing: border-box; }
body{ margin:0; background: var(--bg); color: var(--text); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
button{ font-family: inherit; cursor: pointer; }

/* Login Screen Overlay */
#loginScreen {
    position: fixed; inset: 0; background: var(--bg); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
}
.login-card {
    background: var(--surface); border: 1px solid var(--border); padding: 30px;
    border-radius: var(--radius-lg); width: 100%; max-width: 400px; text-align: center;
}
.login-card input {
    width: 100%; padding: 12px; margin: 10px 0; background: var(--surface-2);
    border: 1px solid var(--border); color: white; border-radius: 6px;
}
.login-card button {
    width: 100%; padding: 12px; background: var(--pending); color: var(--pending-ink);
    border: none; border-radius: 6px; font-weight: 700; margin-top: 10px;
}
.login-card .toggle-auth { color: var(--text-muted); font-size: 12px; margin-top: 15px; display: block; background: none; border: none; width: 100%; }

/* Layout Components */
.topbar{ height: 60px; display:flex; align-items:center; padding: 0 20px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top:0; z-index: 30; }
.topbar__brand{ display:flex; align-items:center; gap:10px; }
.brand-mark{ width:32px; height:32px; border-radius:8px; background: linear-gradient(155deg, var(--pending), var(--cancelled)); color:#1a1206; display:flex; align-items:center; justify-content:center; font-family: var(--font-mono); font-weight:800; }
.topbar__title{ font-size: 15px; font-weight:500; color: var(--text-muted); margin:0; padding-left:20px; border-left:1px solid var(--border); flex:1; }
.app-shell{ display:flex; min-height: calc(100vh - 60px); }
.sidebar{ width: 168px; background: var(--surface); border-right: 1px solid var(--border); padding: 16px 10px; display:flex; flex-direction:column; gap:2px; }
.side-link{ display:flex; align-items:center; gap:10px; padding: 9px 10px; border-radius: var(--radius-sm); color: var(--text-muted); font-size:13px; text-decoration: none; }
.side-link.is-active{ background: var(--surface-2); color: var(--pending); }
.main{ flex:1; padding: 22px 24px; min-width:0; }

/* Stats Grid */
.stats__grid{ display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; margin-bottom: 24px; }
.stat-card{ background: var(--surface); border:1px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; border-top: 3px solid transparent; }
.stat-card--pending{ border-top-color: var(--pending); }
.stat-card--revenue{ border-top-color: #C9A9F5; }
.stat-card__value{ font-family: var(--font-mono); font-size: 24px; display: block; margin-top: 5px; }

/* Search & Filters */
.toolbar{ display:flex; gap:14px; margin-bottom: 18px; }
.search{ background: var(--surface); border:1px solid var(--border); border-radius: 999px; padding: 9px 14px; flex: 1; display: flex; align-items: center; }
.search input{ border:none; background:transparent; outline:none; color: var(--text); width:100%; margin-left: 8px; }
.filters{ display:flex; gap:6px; background: var(--surface); border:1px solid var(--border); border-radius:999px; padding:4px; }
.filter-chip{ border:none; background:transparent; color: var(--text-muted); padding: 7px 14px; border-radius:999px; }
.filter-chip.is-active{ background: var(--surface-2); color: var(--text); }

/* Ticket Styles */
.orders__grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 22px; }
.ticket{
    background:#fffdf8;
    color:#222;
    width:320px;
    margin:auto;
    padding:20px;
    border-radius:0;
    position:relative;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
    font-family:"JetBrains Mono", monospace;
    overflow:visible;
}
.ticket::before,
.ticket::after{
    content:"";
    position:absolute;
    left:0;
    width:100%;
    height:8px;
    pointer-events:none;
    background-image:
        radial-gradient(circle, #14171C 3px, transparent 3px);
    background-size:8px 8px;
    background-repeat:repeat-x;
}

.ticket::before{
    top:-4px;
}

.ticket::after{
    bottom:-4px;
}.ticket__head{ display: flex; justify-content: space-between; border-bottom: 1px dashed var(--paper-edge); padding-bottom: 10px; margin-bottom: 10px; }
.ticket__id{ font-family: var(--font-mono); font-weight: 800; }
.ticket__section{ margin-bottom: 12px; font-size: 13px; }
.ticket__label{ font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; color: var(--paper-ink-muted); margin: 0; }
.ticket__actions{ display: flex; gap: 8px; margin-top: 15px; }
.tbtn{ flex: 1; padding: 10px; border: none; border-radius: 4px; font-weight: 700; font-size: 12px; }
.tbtn--accept{ background: var(--preparing); color: white; }
.tbtn--delivered{ background: var(--delivered); color: white; }
.tbtn--cancel{ background: transparent; border: 1px solid var(--cancelled); color: var(--cancelled); }

/* Toasts */
.toast-stack{ position: fixed; top: 20px; right: 20px; z-index: 1100; }
.toast { background: var(--paper); color: var(--paper-ink); padding: 15px; border-radius: 8px; border-left: 5px solid var(--pending); margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
.status{
    margin-top:12px;
    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    font-size:11px;
    font-weight:700;
    letter-spacing:1px;
}

.status-pending{
    background:#FFE8A3;
    color:#8A5A00;
}

.status-preparing{
    background:#D8EEFF;
    color:#005DB8;
}

.status-delivered{
    background:#DDF8E5;
    color:#0A8A44;
}

.status-cancelled{
    background:#FFD9D9;
    color:#C62828;
}
.ticket__actions{
    display:flex;
    gap:10px;
    margin-top:18px;
}

.btn{
    flex:1;
    border:none;
    padding:12px;
    border-radius:6px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
}

.btn:hover{
    transform:translateY(-2px);
}

.btn-accept{
    background:#46C08A;
    color:white;
}

.btn-cancel{
    background:#E8604C;
    color:white;
}


</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
    <div class="login-card">
        <div class="brand-mark" style="margin: 0 auto 20px;">OD</div>
        <h2 id="authTitle">Admin Login</h2>
        <input type="email" id="authEmail" placeholder="Email Address">
        <input type="password" id="authPassword" placeholder="Password">
        <button id="authBtn">Sign In</button>
        <button class="toggle-auth" id="toggleAuth">Don't have an account? Sign Up (First time only)</button>
    </div>
</div>

<!-- MAIN DASHBOARD -->
<header class="topbar">
  <div class="topbar__brand">
    <div class="brand-mark">OD</div>
    <span class="brand-name">Order Desk</span>
  </div>
  <h1 class="topbar__title">Admin Dashboard</h1>
  <div class="topbar__profile">
    <button class="profile-chip" style="background:none; border:none; color:white; display:flex; align-items:center; gap:10px;">
      <span id="adminEmail" style="font-size:12px; color:var(--text-muted);"></span>
      <div class="profile-avatar">FF</div>
    </button>
  </div>
</header>

<div class="app-shell">
  <nav class="sidebar">
    <a class="side-link is-active" href="#"><span>Dashboard</span></a>
    <a class="side-link" href="#" id="logoutBtn"><span style="color:var(--cancelled)">Logout</span></a>
  </nav>

  <main class="main">
    <section class="stats">
      <div class="stats__grid">
        <div class="stat-card stat-card--pending">
          <span class="stat-card__label">Pending</span>
          <span class="stat-card__value" id="statPending">0</span>
        </div>
        <div class="stat-card" style="border-top-color: var(--preparing)">
            <span class="stat-card__label">Preparing</span>
            <span class="stat-card__value" id="statPreparing">0</span>
        </div>
        <div class="stat-card" style="border-top-color: var(--delivered)">
            <span class="stat-card__label">Completed</span>
            <span class="stat-card__value" id="statDelivered">0</span>
        </div>
        <div class="stat-card stat-card--revenue">
          <span class="stat-card__label">Today's Revenue</span>
          <span class="stat-card__value" id="statRevenue">Rs 0</span>
        </div>
      </div>
    </section>

    <section class="toolbar">
      <div class="search">
        <input id="searchInput" type="text" placeholder="Search customer or ID...">
      </div>
      <div class="filters" id="filters">
        <button class="filter-chip is-active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="pending">Pending</button>
        <button class="filter-chip" data-filter="preparing">Preparing</button>
      </div>
    </section>

    <div class="orders__grid" id="ordersGrid"></div>
  </main>
</div>

<div class="toast-stack" id="toastStack"></div>
<!-- SCRIPTS -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* =========================================================
   ORDER DESK — Core Logic
   Matches Supabase Schema: id, customer, phone, address, notes, items, total, status, created_at
   ========================================================= */

const STATUS = {
  PENDING: 'pending',
  PREPARING: 'preparing',
  DELIVERED: 'delivered',
  CANCELLED: 'cancelled',
};

const STATUS_LABEL = {
  [STATUS.PENDING]: 'Pending',
  [STATUS.PREPARING]: 'Preparing',
  [STATUS.DELIVERED]: 'Delivered',
  [STATUS.CANCELLED]: 'Cancelled',
};

let ORDERS = [];
const supabaseUrl = "https://cctctqhsaywlgcbycecp.supabase.co";
const supabaseKey = "sb_publishable_57Jt5_fxPpAS3rnBQbYQ2A_RhdLxWwQ";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

/* ---------------- HELPERS ---------------- */
function formatTime(ts) {
  if (!ts) return "---";
  return new Date(ts).toLocaleTimeString('en-PK', {
    hour: 'numeric',
    minute: '2-digit',
    day: 'short',
    month: 'short'
  });
}

function formatMoney(n) {
  return 'Rs ' + (n || 0).toLocaleString('en-PK');
}

function waitMinutesSeconds(order) {
  const end = (order.status === STATUS.DELIVERED || order.status === STATUS.CANCELLED)
    ? (order.finishedAt || Date.now())
    : Date.now();
  const ms = Math.max(0, end - order.createdAt);
  const totalSec = Math.floor(ms / 1000);
  return {
    m: Math.floor(totalSec / 60),
    s: totalSec % 60,
    totalMin: totalSec / 60
  };
}

/* ---------------- DATA LOADING ---------------- */
async function loadOrders() {
  const { data, error } = await supabaseClient
    .from("orders")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error("Supabase Load Error:", error);
    return;
  }

  // MAPPING SUPABASE DATA TO DASHBOARD UI
  ORDERS = data.map(order => ({
    id: order.id,
    customer: order.customer,
    phone: order.phone,
    items: order.items || [], // Matches the JSON array from website
    total: order.total,       // Matches the total column
    address: order.address,   // Matches the string column
    notes: order.notes,
    status: order.status,
    createdAt: new Date(order.created_at).getTime()
  }));

  render();
}

/* ---------------- ACTIONS ---------------- */
async function setStatus(id, status) {
  const order = ORDERS.find(o => o.id == id);
  if (!order) return;

  const { error } = await supabaseClient
    .from("orders")
    .update({ status: status })
    .eq("id", id);

  if (error) {
    alert("Status update failed: " + error.message);
    return;
  }

  order.status = status;
  if (status === STATUS.DELIVERED || status === STATUS.CANCELLED) {
    order.finishedAt = Date.now();
  }

  if (typeof closeSheet === 'function') closeSheet();
  render();
}

/* ---------------- REALTIME ---------------- */
function initRealtime() {
  supabaseClient
    .channel('db-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, (payload) => {
      if (payload.eventType === 'INSERT') {
        if (typeof playChime === 'function') playChime();
      }
      loadOrders(); // Refresh all data on any change
    })
    .subscribe();
}

/* ---------------- INITIALIZE ---------------- */
loadOrders();
initRealtime();


/* =========================================================
   DASHBOARD RENDERING (UI Logic)
   ========================================================= */

(function () {
  'use strict';

  const grid = document.getElementById('ordersGrid');
  const emptyMsg = document.getElementById('ordersEmpty');
  const searchInput = document.getElementById('searchInput');
  const filtersEl = document.getElementById('filters');
  
  let state = {
    filter: 'all',
    query: '',
  };

  function escapeHtml(str) {
    if (!str) return "";
    return String(str).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function renderStats() {
    const pending = ORDERS.filter(o => o.status === STATUS.PENDING).length;
    const preparing = ORDERS.filter(o => o.status === STATUS.PREPARING).length;
    const delivered = ORDERS.filter(o => o.status === STATUS.DELIVERED).length;
    const revenue = ORDERS
      .filter(o => o.status === STATUS.DELIVERED)
      .reduce((sum, o) => sum + (Number(o.total) || 0), 0);

    document.getElementById('statPending').textContent = pending;
    document.getElementById('statPreparing').textContent = preparing;
    document.getElementById('statDelivered').textContent = delivered;
    document.getElementById('statRevenue').textContent = formatMoney(revenue);
  }

  function ticketMarkup(order, opts = {}) {
    const { m, s, totalMin } = waitMinutesSeconds(order);
    const isActive = order.status === STATUS.PENDING || order.status === STATUS.PREPARING;
    
    // Build items list
    const itemsHtml = order.items.map(it => `
      <li><span class="qty">${it.qty}×</span> ${escapeHtml(it.name)}</li>
    `).join('');

    return `
      <article class="ticket" data-status="${order.status}" data-id="${order.id}" style="--tilt:${opts.tilt || 0}deg">
        <div class="ticket__stripe"></div>
        <div class="ticket__head">
          <span class="ticket__id">#${String(order.id).padStart(3, '0')}</span>
          ${isActive ? `
            <div class="ticket__timer">
              <span class="dot"></span>
              <span class="ticket__timer-text">Waiting ${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}</span>
            </div>` : `<span class="ticket__time">${formatTime(order.createdAt)}</span>`}
          <span class="ticket__status">${STATUS_LABEL[order.status]}</span>
        </div>

        <div class="ticket__section">
          <p class="ticket__label">Customer</p>
          <p class="ticket__customer">${escapeHtml(order.customer)}</p>
          <p class="ticket__phone">${escapeHtml(order.phone)}</p>
        </div>

        <div class="ticket__section">
          <p class="ticket__label">Items</p>
          <ul class="ticket__items">${itemsHtml}</ul>
        </div>

        <div class="ticket__section">
          <div class="ticket__totals">
            <div class="ticket__totals-row is-total"><span>Total</span><span>${formatMoney(order.total)}</span></div>
          </div>
        </div>

        <div class="ticket__section">
          <p class="ticket__label">Address</p>
          <p class="ticket__address">${escapeHtml(order.address)}</p>
        </div>

        ${order.notes ? `
        <div class="ticket__section">
          <p class="ticket__label">Notes</p>
          <p class="ticket__note">${escapeHtml(order.notes)}</p>
        </div>` : ''}

        <div class="ticket__actions">
           ${order.status === STATUS.PENDING ? `
            <button class="tbtn tbtn--accept" data-action="accept" data-id="${order.id}">Accept</button>
            <button class="tbtn tbtn--cancel" data-action="cancel" data-id="${order.id}">Cancel</button>
          ` : ''}
          ${order.status === STATUS.PREPARING ? `
            <button class="tbtn tbtn--delivered" data-action="deliver" data-id="${order.id}">Mark Delivered</button>
            <button class="tbtn tbtn--cancel" data-action="cancel" data-id="${order.id}">Cancel</button>
          ` : ''}
          ${order.status === STATUS.DELIVERED ? `<button class="tbtn" disabled>COMPLETED</button>` : ''}
        </div>
      </article>
    `;
  }

  window.render = function render() {
    renderStats();
    const list = ORDERS.filter(o => {
        const matchesFilter = state.filter === 'all' ? true : o.status === state.filter;
        const q = state.query.toLowerCase();
        const matchesSearch = o.customer.toLowerCase().includes(q) || o.phone.includes(q) || String(o.id).includes(q);
        return matchesFilter && matchesSearch;
    });

    emptyMsg.hidden = list.length > 0;
    grid.innerHTML = list.map((o, i) => ticketMarkup(o, { tilt: (i % 2 === 0 ? 0.5 : -0.5) })).join('');
  }

  /* ---------------- INTERACTIVITY ---------------- */
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const id = btn.dataset.id;
    const action = btn.dataset.action;
    if (action === 'accept') setStatus(id, STATUS.PREPARING);
    if (action === 'deliver') setStatus(id, STATUS.DELIVERED);
    if (action === 'cancel') setStatus(id, STATUS.CANCELLED);
  });

  searchInput.addEventListener('input', (e) => {
    state.query = e.target.value;
    render();
  });

  filtersEl.addEventListener('click', (e) => {
    const chip = e.target.closest('.filter-chip');
    if (!chip) return;
    filtersEl.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('is-active'));
    chip.classList.add('is-active');
    state.filter = chip.dataset.filter;
    render();
  });

  setInterval(() => {
    // Basic timer refresh without full re-render
    document.querySelectorAll('.ticket__timer-text').forEach(el => {
        const id = el.closest('.ticket').dataset.id;
        const order = ORDERS.find(o => o.id == id);
        if (order) {
            const { m, s } = waitMinutesSeconds(order);
            el.textContent = `Waiting ${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }
    });
  }, 1000);

})();
</script>
</body>
</html>
